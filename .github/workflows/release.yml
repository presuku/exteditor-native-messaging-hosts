name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: native/go.sum

      - name: Build packages
        run: |
          chmod +x scripts/mkpkg.sh
          ./scripts/mkpkg.sh

      - name: Set release tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "name=latest" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name == 'latest' && 'Latest Development Build' || steps.tag.outputs.name }}
          files: |
            output/exteditor-windows_amd64.zip
            output/exteditor-linux_amd64.zip
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.tag.outputs.name != 'latest' && 'true' || 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
